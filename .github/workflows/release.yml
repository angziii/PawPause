name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check signing and notarization secrets
        shell: bash
        run: |
          missing=0
          for name in APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID CSC_LINK CSC_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name is missing"
              missing=1
            fi
          done
          exit "$missing"

      - name: Prepare macOS signing certificate
        shell: bash
        run: |
          cert_path="$RUNNER_TEMP/developer-id-application.p12"

          if [[ "$CSC_LINK" == base64://* ]]; then
            printf "%s" "${CSC_LINK#base64://}" | base64 -D > "$cert_path"
          elif [[ "$CSC_LINK" == http://* || "$CSC_LINK" == https://* ]]; then
            curl -fsSL "$CSC_LINK" -o "$cert_path"
          elif [[ -f "$CSC_LINK" ]]; then
            cert_path="$CSC_LINK"
          else
            printf "%s" "$CSC_LINK" | base64 -D > "$cert_path"
          fi

          echo "CSC_LINK=$cert_path" >> "$GITHUB_ENV"

      - name: Build signed and notarized macOS artifact
        shell: bash
        run: |
          set -euo pipefail

          corepack pnpm build
          env -u APPLE_ID -u APPLE_APP_SPECIFIC_PASSWORD -u APPLE_TEAM_ID \
            SKIP_NOTARIZE=1 pnpm exec electron-builder --mac --${{ matrix.arch }} --dir --publish never

          app_path="$(find dist -name 'PawPause.app' -type d -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "::error::PawPause.app was not generated"
            exit 1
          fi

          app_zip="$RUNNER_TEMP/PawPause-${{ matrix.arch }}.app.zip"
          ditto -c -k --keepParent "$app_path" "$app_zip"

          echo "Submitting app bundle for notarization..."
          xcrun notarytool submit "$app_zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 30m
          xcrun stapler staple "$app_path"
          xcrun stapler validate "$app_path"

          app_dir="$(dirname "$app_path")"
          env -u APPLE_ID -u APPLE_APP_SPECIFIC_PASSWORD -u APPLE_TEAM_ID \
            SKIP_NOTARIZE=1 pnpm exec electron-builder --mac dmg --${{ matrix.arch }} --prepackaged "$app_dir" --publish never

          dmg_path="$(find dist -name 'PawPause-*-mac-${{ matrix.arch }}.dmg' -type f -print -quit)"
          if [[ -z "$dmg_path" ]]; then
            echo "::error::macOS DMG was not generated"
            exit 1
          fi

          echo "Submitting DMG for notarization..."
          xcrun notarytool submit "$dmg_path" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 30m
          xcrun stapler staple "$dmg_path"
          xcrun stapler validate "$dmg_path"

      - name: Verify notarized macOS artifact
        shell: bash
        run: |
          app_path="$(find dist -name 'PawPause.app' -type d -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "::error::PawPause.app was not generated"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          codesign -dv --verbose=4 "$app_path"
          xcrun stapler validate "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"

          dmg_path="$(find dist -name 'PawPause-*-mac-${{ matrix.arch }}.dmg' -type f -print -quit)"
          if [[ -z "$dmg_path" ]]; then
            echo "::error::macOS DMG was not generated"
            exit 1
          fi

          xcrun stapler validate "$dmg_path"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg_path"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/PawPause-*-mac-${{ matrix.arch }}.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installer
        run: pnpm dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/PawPause-*-win-x64.exe
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes/${{ github.ref_name }}.md
          files: release-artifacts/*
          fail_on_unmatched_files: true
          make_latest: true

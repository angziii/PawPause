name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check signing and notarization secrets
        shell: bash
        run: |
          missing=0
          for name in APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID CSC_LINK CSC_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name is missing"
              missing=1
            fi
          done
          exit "$missing"

      - name: Prepare macOS signing certificate
        shell: bash
        run: |
          cert_path="$RUNNER_TEMP/developer-id-application.p12"

          if [[ "$CSC_LINK" == base64://* ]]; then
            printf "%s" "${CSC_LINK#base64://}" | base64 -D > "$cert_path"
          elif [[ "$CSC_LINK" == http://* || "$CSC_LINK" == https://* ]]; then
            curl -fsSL "$CSC_LINK" -o "$cert_path"
          elif [[ -f "$CSC_LINK" ]]; then
            cert_path="$CSC_LINK"
          else
            printf "%s" "$CSC_LINK" | base64 -D > "$cert_path"
          fi

          echo "CSC_LINK=$cert_path" >> "$GITHUB_ENV"

      - name: Import and verify Developer ID identity
        shell: bash
        run: |
          keychain="$RUNNER_TEMP/pawpause-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"

          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"

          import_log="$RUNNER_TEMP/security-import.log"
          if ! security import "$CSC_LINK" -k "$keychain" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild > "$import_log" 2>&1; then
            echo "::error::Failed to import CSC_LINK p12. Verify CSC_KEY_PASSWORD and confirm the secret contains a valid p12."
            sed -E 's/[A-F0-9]{40}/[HASH]/g' "$import_log" | sed -E 's/"[^"]+"/"[redacted identity]"/g'
            exit 1
          fi

          partition_log="$RUNNER_TEMP/security-partition.log"
          if ! security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain" > "$partition_log" 2>&1; then
            echo "::error::Failed to unlock the imported code signing key for codesign."
            sed -E 's/[A-F0-9]{40}/[HASH]/g' "$partition_log" | sed -E 's/"[^"]+"/"[redacted identity]"/g'
            exit 1
          fi

          existing_keychains="$(security list-keychains -d user | tr -d '"' || true)"
          security list-keychains -d user -s "$keychain" $existing_keychains

          identities="$(security find-identity -v -p codesigning "$keychain" || true)"
          if ! grep -q "Developer ID Application" <<< "$identities"; then
            echo "::error::CSC_LINK must be a p12 containing a Developer ID Application certificate and its private key. Also verify CSC_KEY_PASSWORD matches that p12."
            echo "$identities" | sed -E 's/[A-F0-9]{40}/[HASH]/g' | sed -E 's/"[^"]+"/"[redacted identity]"/g'
            exit 1
          fi

          echo "Developer ID Application identity found in the temporary signing keychain."
          echo "CSC_KEYCHAIN=$keychain" >> "$GITHUB_ENV"
          echo "CSC_LINK=" >> "$GITHUB_ENV"

      - name: Build signed and notarized macOS artifact
        run: pnpm dist:mac:${{ matrix.arch }}

      - name: Verify notarized macOS artifact
        shell: bash
        run: |
          app_path="$(find dist -name 'PawPause.app' -type d -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "::error::PawPause.app was not generated"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          codesign -dv --verbose=4 "$app_path"
          xcrun stapler validate "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"

          dmg_path="$(find dist -name 'PawPause-*-mac-${{ matrix.arch }}.dmg' -type f -print -quit)"
          if [[ -z "$dmg_path" ]]; then
            echo "::error::macOS DMG was not generated"
            exit 1
          fi

          xcrun stapler validate "$dmg_path"
          spctl --assess --type open --verbose=4 "$dmg_path"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            dist/PawPause-*-mac-${{ matrix.arch }}.dmg
            dist/PawPause-*-mac-${{ matrix.arch }}.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installer
        run: pnpm dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/PawPause-*-win-x64.exe
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes/v1.0.0.md
          files: release-artifacts/*
          fail_on_unmatched_files: true
          make_latest: true
